<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sophia Shop - Zophiekat</title>
    <link rel="stylesheet" href="../css/normalize.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        /* Shop grid base */
        .shop-grid {
            display: grid;
            gap: 20px;
            margin-top: 30px;
        }

        /* Shop item base */
        .shop-item {
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            background: #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .shop-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
        }
        .shop-item.sold-out {
            opacity: 0.5;
            pointer-events: none;
        }
        .shop-item.sold-out .details-btn {
            pointer-events: auto;
            opacity: 1;
        }
        .shop-item.reserved {
            opacity: 0.5;
            pointer-events: none;
        }
        .shop-item.reserved .details-btn {
            pointer-events: auto;
            opacity: 1;
        }
        .shop-item-img-container {
            background-color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            overflow: hidden;
        }
        .shop-item-img-container img {
            object-fit: contain;
        }
        .shop-item-content {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            color: #222;
        }
        .shop-item-info {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            color: #222;
        }
        .shop-item-desc {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: #222;
        }
        .shop-item h3 {
            margin-top: 0;
            line-height: 1.2;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .shop-item .category {
            color: #666;
            min-height: 1rem;
        }
        .shop-item .price {
            font-weight: bold;
            color: #222;
        }
        .shop-item .status {
            display: inline-block;
            padding: 3px 6px;
            border-radius: 4px;
            font-weight: 600;
            align-self: flex-start;
        }
        
        /* Status styling based on textual content */
        .status[data-status^="Vendido"], .status[data-status^="Sold"] { background: #ffebee; color: #c62828; }
        .status[data-status^="Disponible"], .status[data-status^="Available"] { background: #e8f5e9; color: #2e7d32; }
        .status[data-status^="Proximamente"], .status[data-status^="Coming Soon"] { background: #fff3e0; color: #e65100; }
        .status[data-status^="Reservado"], .status[data-status^="Reserved"] { background: #e3f2fd; color: #1565c0; }
        /* Default status fallback */
        .status:not([data-status^="Vendido"]):not([data-status^="Disponible"]):not([data-status^="Proximamente"]):not([data-status^="Reservado"]):not([data-status^="Sold"]):not([data-status^="Available"]):not([data-status^="Coming Soon"]):not([data-status^="Reserved"]) { background: #f0f0f0; color: #333; }
        
        .shop-item .website-link {
            display: inline-block;
            margin-top: auto;
            text-align: center;
            padding: 6px;
            background-color: #222;
            color: #fff;
            text-decoration: none;
            border: none;
            border-radius: 4px;
            transition: background 0.3s;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .shop-item .website-link:hover {
            background-color: #555;
        }

        /* Item overlay */
        .item-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .item-overlay-content {
            background: #fff;
            border-radius: 12px;
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            color: #222;
            position: relative;
        }
        .item-overlay-content .overlay-img {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            background: #f5f5f5;
            border-radius: 12px 12px 0 0;
            display: block;
        }
        .item-overlay-content .overlay-body {
            padding: 20px;
        }
        .item-overlay-content .overlay-body h2 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1.3rem;
            color: #222;
            border: none;
        }
        .item-overlay-content .overlay-body .overlay-status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .item-overlay-content .overlay-body .overlay-price {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .item-overlay-content .overlay-body .overlay-desc {
            font-size: 0.95rem;
            color: #444;
            line-height: 1.5;
            margin-bottom: 15px;
        }
        .item-overlay-content .overlay-body .overlay-link {
            display: inline-block;
            padding: 10px 20px;
            background: #222;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 600;
            transition: background 0.3s;
        }
        .item-overlay-content .overlay-body .overlay-link:hover {
            background: #555;
        }
        .item-overlay-close {
            position: absolute;
            top: 10px;
            right: 14px;
            font-size: 1.5rem;
            color: #666;
            cursor: pointer;
            background: rgba(255,255,255,0.8);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .item-overlay-close:hover {
            color: #222;
        }

        /* Status filter */
        .shop-filters {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .filter-dropdown {
            position: relative;
            display: inline-block;
        }
        .filter-dropdown-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border: 1px solid #555;
            border-radius: 6px;
            background: #333;
            color: #ddd;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .filter-dropdown-btn:hover {
            background: #444;
            color: #fff;
        }
        .filter-dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 4px;
            background: #333;
            border: 1px solid #555;
            border-radius: 6px;
            padding: 8px 12px;
            z-index: 100;
            min-width: 160px;
        }
        .filter-dropdown-menu.open {
            display: block;
        }
        .filter-dropdown-menu label {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
            color: #ddd;
            font-size: 0.85rem;
            cursor: pointer;
            white-space: nowrap;
        }
        .filter-dropdown-menu label:hover {
            color: #fff;
        }
        .filter-dropdown-menu input[type="checkbox"] {
            accent-color: #845ce9;
        }

        #loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: #666;
        }

        /* Language toggle */
        .lang-toggle {
            display: inline-flex;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #555;
            margin-top: 10px;
            margin-bottom: 10px;
        }
        .lang-toggle button {
            padding: 6px 16px;
            border: none;
            background: #333;
            color: #aaa;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .lang-toggle button:not(:last-child) {
            border-right: 1px solid #555;
        }
        .lang-toggle button.active {
            background: #845ce9;
            color: #fff;
        }
        .lang-toggle button:hover:not(.active) {
            background: #444;
            color: #ddd;
        }

        /* View toggle button */
        .view-toggle {
            position: fixed;
            top: 10px;
            right: 20px;
            z-index: 1001;
            display: none;
        }
        .view-toggle button {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border: 1px solid #555;
            border-radius: 6px;
            background: #333;
            color: #ddd;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .view-toggle button:hover {
            background: #444;
            color: #fff;
        }

        /* Mobile simulation frame (only on large screens) */
        .mobile-sim #page-wrapper {
            max-width: 393px !important;
            margin: 20px auto !important;
            border: 2px solid #555;
            border-radius: 24px;
            overflow: hidden;
            max-height: 852px;
            overflow-y: auto;
            background: var(--body-bg-color);
        }
        .mobile-sim #header-placeholder {
            position: relative !important;
        }
    </style>
    <link id="shop-desktop-css" rel="stylesheet" href="../css/shop-desktop.css" media="(min-width: 769px)">
    <link id="shop-mobile-css" rel="stylesheet" href="../css/shop-mobile.css" media="(max-width: 768px)">
</head>
<body>
    <div id="page-wrapper">
    <!-- Header placeholder -->
    <div id="header-placeholder"></div>
    
    <main>
        <div class="container">
            <section class="shop-section" style="margin-bottom: 60px;">
                <h1>Sophia Shop</h1>
                <div class="lang-toggle" id="lang-toggle">
                    <button data-lang="es" class="active">Español</button>
                    <button data-lang="en">English</button>
                </div>
                <div id="shop-description"></div>

                <div class="shop-filters">
                    <div class="filter-dropdown" id="status-filter">
                        <button class="filter-dropdown-btn" type="button" data-en="Filter Status"><i class="fas fa-filter"></i> Filter Status</button>
                        <div class="filter-dropdown-menu">
                            <label><input type="checkbox" value="Available" checked> <span data-en="Available">Available</span></label>
                            <label><input type="checkbox" value="Sold" checked> <span data-en="Sold">Sold</span></label>
                            <label><input type="checkbox" value="Reserved" checked> <span data-en="Reserved">Reserved</span></label>
                        </div>
                    </div>
                </div>
                
                <div id="loading">Loading items... <i class="fas fa-spinner fa-spin"></i></div>
                <div class="shop-grid" id="shop-grid"></div>
            </section>
        </div>
    </main>

    <!-- Footer placeholder -->
    <div id="footer-placeholder"></div>
    </div><!-- end page-wrapper -->

    <script src="../js/main.js"></script>
    <script>
        (function() {
            const desktopCSS = document.getElementById('shop-desktop-css');
            const mobileCSS = document.getElementById('shop-mobile-css');
            let currentMode = window.innerWidth > 768 ? 'desktop' : 'mobile';

            function setView(mode) {
                const isLargeScreen = window.innerWidth > 768;
                if (mode === 'desktop') {
                    desktopCSS.media = 'all';
                    mobileCSS.media = 'not all';
                    document.body.classList.remove('mobile-sim');
                } else {
                    desktopCSS.media = 'not all';
                    mobileCSS.media = 'all';
                    if (isLargeScreen) {
                        document.body.classList.add('mobile-sim');
                    } else {
                        document.body.classList.remove('mobile-sim');
                    }
                }
                currentMode = mode;
            }

            // Apply default view immediately
            setView(currentMode);

            // Wait for header to be injected, then append toggle button
            const observer = new MutationObserver(function(mutations, obs) {
                const placeholder = document.getElementById('header-placeholder');
                if (placeholder && placeholder.children.length > 0) {
                    obs.disconnect();
                    const toggle = document.createElement('div');
                    toggle.className = 'view-toggle';
                    const btnIcon = currentMode === 'desktop' ? 'fa-mobile-alt' : 'fa-desktop';
                    const btnLabel = currentMode === 'desktop' ? 'Mobile View' : 'Desktop View';
                    toggle.innerHTML = `<button id="view-toggle-btn" title="Switch layout"><i class="fas ${btnIcon}"></i> ${btnLabel}</button>`;
                    document.body.appendChild(toggle);

                    const btn = document.getElementById('view-toggle-btn');
                    btn.addEventListener('click', function() {
                        if (currentMode === 'desktop') {
                            setView('mobile');
                            btn.innerHTML = '<i class="fas fa-desktop"></i> Desktop View';
                        } else {
                            setView('desktop');
                            btn.innerHTML = '<i class="fas fa-mobile-alt"></i> Mobile View';
                        }
                    });
                }
            });
            observer.observe(document.getElementById('header-placeholder'), { childList: true });
        })();
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const sheetUrl = "https://docs.google.com/spreadsheets/d/1fWni84LTqg0R7-iX8gC2l8beKC5rIupOTOTIwxT6l7A/export?format=csv";
            
            Papa.parse(sheetUrl, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const data = results.data;
                    const grid = document.getElementById('shop-grid');
                    const loading = document.getElementById('loading');
                    
                    if (data.length > 0) {
                        loading.style.display = 'none';
                        data.forEach(item => {
                            // Extract values correctly based on the updated headers
                            const nombre = item['Name'] || 'Unknown Item';
                            
                            // If index is missing or name is unknown, it might be an empty/invalid row
                            if (!item['Index'] && !item['Name']) return;
                            
                            const description = item['Description'] || '';
                            const status = item['Status'] || '';
                            const price = item['Price'] || '';
                            const thumbnail = item['Thumbnail'] || '';
                            const link = item['Link'] || '';
                            
                            const card = document.createElement('div');
                            card.className = 'shop-item';
                            if (/^(Sold|Vendido)/i.test(status)) {
                                card.classList.add('sold-out');
                            }
                            if (/^(Reserved|Reservado)/i.test(status)) {
                                card.classList.add('reserved');
                            }
                            card.setAttribute('title', nombre);
                            
                            let imageHtml = '';
                            if (thumbnail) {
                                // Convert Google Drive view links to direct image links
                                let imgSrc = thumbnail;
                                const driveMatch = thumbnail.match(/drive\.google\.com\/file\/d\/([^\/]+)/);
                                if (driveMatch && driveMatch[1]) {
                                    // Use Google Drive's thumbnail endpoint which is more reliable for <img> embedding
                                    imgSrc = `https://drive.google.com/thumbnail?id=${driveMatch[1]}&sz=w800`;
                                }
                                
                                // Add fallback to an icon if image fails to load
                                imageHtml = `
                                    <div class="shop-item-img-container">
                                        <img src="${imgSrc}" alt="${nombre}" title="${nombre}" onerror="this.onerror=null; this.style.display='none'; this.nextElementSibling.style.display='flex';">
                                        <div style="display:none; align-items:center; justify-content:center; width:100%; height:100%;" title="${nombre}">
                                            <i class="fas fa-image fa-3x"></i>
                                        </div>
                                    </div>
                                `;
                            } else {
                                imageHtml = `<div class="shop-item-img-container" title="${nombre}"><i class="fas fa-image fa-3x"></i></div>`;
                            }

                            card.dataset.link = link || '';
                            card.dataset.description = description || '';
                            card.dataset.statusKey = status || '';

                            card.innerHTML = `
                                ${imageHtml}
                                <div class="shop-item-info">
                                    <h3>${nombre}</h3>
                                    ${status ? `<div class="status" data-status="${status}" data-en="${status}">${status}</div>` : ''}
                                    ${price ? `<div class="price">${price}</div>` : ''}
                                </div>
                                <div class="shop-item-desc">
                                    ${description ? `<div class="category" data-en="${description}">${description}</div>` : ''}
                                    <button class="website-link details-btn" type="button">Details</button>
                                </div>
                            `;

                            card.querySelector('.details-btn').addEventListener('click', function() {
                                openItemOverlay(card);
                            });
                            
                            grid.appendChild(card);
                        });
                        // Apply default language to newly loaded items
                        applyLanguage(currentLang);
                    } else {
                        loading.innerHTML = 'No items found.';
                    }
                },
                error: function(error) {
                    console.error("Error fetching sheet:", error);
                    document.getElementById('loading').innerHTML = 'Error loading items. Please try again later.';
                }
            });

            // Language toggle logic
            const descEl = document.getElementById('shop-description');
            const langToggle = document.getElementById('lang-toggle');
            let currentLang = 'es';
            let englishDescription = '';
            let spanishDescription = '';
            const translationCache = {};

            // Fixed UI translations (English → Spanish)
            const uiTranslations = {
                'Sold': 'Vendido',
                'Available': 'Disponible',
                'Coming Soon': 'Proximamente',
                'Reserved': 'Reservado',
                'Product Link': 'Enlace del Producto',
                'Details': 'Detalles',
                'Filter Status': 'Filtrar Estado',
                'Loading items...': 'Cargando artículos...',
                'No items found.': 'No se encontraron artículos.',
                'Error loading items. Please try again later.': 'Error al cargar artículos. Inténtelo de nuevo más tarde.',
                'Unknown Item': 'Artículo Desconocido'
            };

            const reverseUiTranslations = {};
            for (const [en, es] of Object.entries(uiTranslations)) {
                reverseUiTranslations[es] = en;
            }

            function translateUi(text, toLang) {
                if (toLang === 'es') return uiTranslations[text] || text;
                if (toLang === 'en') return reverseUiTranslations[text] || text;
                return text;
            }

            // Dynamic translation via MyMemory API
            async function dynamicTranslate(text, fromLang, toLang) {
                if (!text.trim()) return text;
                const cacheKey = fromLang + '>' + toLang + ':' + text;
                if (translationCache[cacheKey]) return translationCache[cacheKey];
                try {
                    const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${fromLang}&tl=${toLang}&dt=t&q=${encodeURIComponent(text)}`);
                    const data = await res.json();
                    if (data && data[0]) {
                        const translated = data[0].map(seg => seg[0]).join('');
                        translationCache[cacheKey] = translated;
                        return translated;
                    }
                } catch (e) {
                    console.warn('Translation failed:', e);
                }
                return text;
            }

            // Render text with blank-line paragraph support, collapsed by default
            function renderDescription(text) {
                const paragraphs = text.split(/\n\s*\n/);
                if (paragraphs.length <= 1) {
                    descEl.innerHTML = paragraphs
                        .map(p => '<p style="margin-bottom: 1em;">' + escapeHtml(p) + '</p>')
                        .join('');
                    return;
                }
                const firstParagraph = '<p style="margin-bottom: 1em;">' + escapeHtml(paragraphs[0]) + '</p>';
                const restParagraphs = paragraphs.slice(1)
                    .map(p => '<p style="margin-bottom: 1em;">' + escapeHtml(p) + '</p>')
                    .join('');
                const expandLabel = currentLang === 'es' ? 'Ver descripción completa...' : 'View full description...';
                const collapseLabel = currentLang === 'es' ? 'Ocultar descripción' : 'Hide description';
                descEl.innerHTML = firstParagraph
                    + '<button id="desc-toggle" style="background:none;border:none;color:#845ce9;cursor:pointer;font-size:0.95rem;font-weight:600;padding:0;margin-bottom:1em;" data-expand="' + expandLabel + '" data-collapse="' + collapseLabel + '">' + expandLabel + '</button>'
                    + '<div id="desc-rest" style="display:none;">' + restParagraphs + '</div>';
                document.getElementById('desc-toggle').addEventListener('click', function() {
                    const rest = document.getElementById('desc-rest');
                    const expanded = rest.style.display !== 'none';
                    rest.style.display = expanded ? 'none' : 'block';
                    this.textContent = expanded ? this.dataset.expand : this.dataset.collapse;
                });
            }

            function escapeHtml(text) {
                return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g, '<br>');
            }

            async function applyLanguage(lang) {
                // Render shop description from the appropriate file
                if (lang === 'en' && englishDescription) {
                    renderDescription(englishDescription);
                } else if (lang === 'es' && spanishDescription) {
                    renderDescription(spanishDescription);
                }

                // Translate all item fields
                const cards = document.querySelectorAll('.shop-item');
                for (const card of cards) {
                    const statusEl = card.querySelector('.status');
                    if (statusEl) {
                        statusEl.textContent = translateUi(statusEl.textContent, lang);
                        statusEl.dataset.status = statusEl.textContent;
                        card.dataset.statusKey = statusEl.textContent;
                    }
                    const descItemEl = card.querySelector('.category');
                    if (descItemEl) {
                        const original = descItemEl.dataset.en;
                        if (lang === 'es' && original) {
                            descItemEl.textContent = await dynamicTranslate(original, 'en', 'es');
                        } else if (original) {
                            descItemEl.textContent = original;
                        }
                    }
                    const linkBtn = card.querySelector('.website-link');
                    if (linkBtn) {
                        linkBtn.textContent = translateUi(linkBtn.textContent, lang);
                    }
                }

                // Translate filter UI
                const filterBtnEl = document.querySelector('.filter-dropdown-btn');
                if (filterBtnEl) {
                    const enLabel = filterBtnEl.dataset.en;
                    filterBtnEl.innerHTML = '<i class="fas fa-filter"></i> ' + translateUi(enLabel, lang);
                }
                document.querySelectorAll('.filter-dropdown-menu span[data-en]').forEach(span => {
                    span.textContent = translateUi(span.dataset.en, lang);
                });

            }

            // Load description files
            Promise.all([
                fetch('../assets/documents/shop-description.txt').then(r => r.text()),
                fetch('../assets/documents/shop-description-es.txt').then(r => r.text())
            ]).then(([enText, esText]) => {
                englishDescription = enText.trim();
                spanishDescription = esText.trim();
                applyLanguage(currentLang);
            }).catch(() => { descEl.innerHTML = ''; });

            langToggle.addEventListener('click', function(e) {
                const btn = e.target.closest('button[data-lang]');
                if (!btn || btn.classList.contains('active')) return;
                langToggle.querySelector('.active').classList.remove('active');
                btn.classList.add('active');
                currentLang = btn.dataset.lang;
                applyLanguage(currentLang);
            });

            // --- Item Overlay ---
            function openItemOverlay(card) {
                const name = card.querySelector('h3').textContent;
                const img = card.querySelector('.shop-item-img-container img');
                const imgSrc = img ? img.src : '';
                const statusEl = card.querySelector('.status');
                const statusText = statusEl ? statusEl.textContent : '';
                const statusData = statusEl ? statusEl.dataset.status : '';
                const priceEl = card.querySelector('.price');
                const priceText = priceEl ? priceEl.textContent : '';
                const descEl = card.querySelector('.category');
                const descText = descEl ? descEl.textContent : '';
                const link = card.dataset.link || '';

                const overlay = document.createElement('div');
                overlay.className = 'item-overlay';

                let statusHtml = '';
                if (statusText) {
                    // Copy the status styling classes
                    statusHtml = `<div class="overlay-status status" data-status="${statusData}">${statusText}</div>`;
                }

                let linkHtml = '';
                if (link) {
                    const linkLabel = currentLang === 'es' ? 'Enlace del Producto' : 'Product Link';
                    linkHtml = `<a href="${link}" target="_blank" rel="noopener noreferrer" class="overlay-link">${linkLabel}</a>`;
                }

                overlay.innerHTML = `
                    <div class="item-overlay-content">
                        <button class="item-overlay-close">&times;</button>
                        ${imgSrc ? `<img class="overlay-img" src="${imgSrc}" alt="${name}">` : ''}
                        <div class="overlay-body">
                            <h2>${name}</h2>
                            ${statusHtml}
                            ${priceText ? `<div class="overlay-price">${priceText}</div>` : ''}
                            ${descText ? `<div class="overlay-desc">${descText}</div>` : ''}
                            ${linkHtml}
                        </div>
                    </div>
                `;

                document.body.appendChild(overlay);
                document.body.style.overflow = 'hidden';

                // Close on clicking outside content or close button
                overlay.addEventListener('click', function(e) {
                    if (e.target === overlay || e.target.closest('.item-overlay-close')) {
                        overlay.remove();
                        document.body.style.overflow = '';
                    }
                });
                document.addEventListener('keydown', function handler(e) {
                    if (e.key === 'Escape') {
                        overlay.remove();
                        document.body.style.overflow = '';
                        document.removeEventListener('keydown', handler);
                    }
                });
            }
            // Make it accessible to inline event handlers
            window.openItemOverlay = openItemOverlay;

            // --- Status Filter ---
            const filterContainer = document.getElementById('status-filter');
            const filterBtn = filterContainer.querySelector('.filter-dropdown-btn');
            const filterMenu = filterContainer.querySelector('.filter-dropdown-menu');
            const filterCheckboxes = filterMenu.querySelectorAll('input[type="checkbox"]');

            filterBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                filterMenu.classList.toggle('open');
            });
            document.addEventListener('click', function(e) {
                if (!filterContainer.contains(e.target)) {
                    filterMenu.classList.remove('open');
                }
            });

            function applyStatusFilter() {
                const checked = Array.from(filterCheckboxes)
                    .filter(cb => cb.checked)
                    .map(cb => cb.value.toLowerCase());

                document.querySelectorAll('.shop-item').forEach(card => {
                    const raw = card.dataset.statusKey || '';
                    // Normalize: map translated status back to English key
                    const enStatus = (reverseUiTranslations[raw] || raw).toLowerCase();
                    if (!raw || checked.some(s => enStatus.startsWith(s))) {
                        card.style.display = '';
                    } else {
                        card.style.display = 'none';
                    }
                });
            }

            filterCheckboxes.forEach(cb => {
                cb.addEventListener('change', applyStatusFilter);
            });

        });
    </script>
</body>
</html>
